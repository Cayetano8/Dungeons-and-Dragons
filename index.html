<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Shinebright Returns</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=IM+Fell+English+SC&family=Crimson+Pro:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --amber: #c8840a;
    --amber-bright: #f0a820;
    --cream: #e8dcc8;
    --parchment: #c4a97a;
  }

  body {
    background: #000;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Crimson Pro', serif;
  }

  /* ── Background ── */
  .bg-layer {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 80% at 50% 50%, #0d1a0f 0%, #000 100%);
    z-index: 0;
  }

  /* ── Fog ── */
  .fog { position: fixed; inset: 0; z-index: 1; overflow: hidden; }
  .fog-particle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,160,120,0.04) 0%, transparent 70%);
    animation: driftFog linear infinite;
  }
  @keyframes driftFog {
    0%   { transform: translateX(-200px) translateY(0) scale(1); opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 0.5; }
    100% { transform: translateX(200px) translateY(-100px) scale(1.3); opacity: 0; }
  }

  /* ── Sparks ── */
  .spark {
    position: fixed;
    width: 3px; height: 3px;
    background: var(--amber-bright);
    border-radius: 50%;
    pointer-events: none;
    animation: floatSpark linear infinite;
    z-index: 3;
  }
  @keyframes floatSpark {
    0%   { transform: translate(0,0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
  }

  /* ── Rune ring ── */
  .rune-ring {
    position: fixed;
    width: min(680px, 90vmin);
    height: min(680px, 90vmin);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    animation: rotateSlow 40s linear infinite;
  }
  .rune-ring svg { width: 100%; height: 100%; animation: runeGlow 4s ease-in-out infinite; }
  @keyframes rotateSlow {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to   { transform: translate(-50%, -50%) rotate(360deg); }
  }
  @keyframes runeGlow {
    0%,100% { opacity: 0.1; }
    50%     { opacity: 0.22; }
  }

  /* ── Portrait — fixed dead-center ── */
  .portrait-wrap {
    position: fixed;
    width: min(350px, 50vmin);
    height: min(350px, 50vmin);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    animation: fadeIn 1.5s ease-out 0.2s both;
  }
  .portrait-img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
    filter: brightness(0.88) contrast(1.1) saturate(0.9);
    mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 55%, transparent 82%);
    -webkit-mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 55%, transparent 82%);
    display: block;
  }
  .eye-glow {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%, -50%);
    width: 55%; height: 16%;
    background: radial-gradient(ellipse, rgba(200,132,10,0.4) 0%, transparent 70%);
    z-index: 6;
    filter: blur(10px);
    animation: eyePulse 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes eyePulse {
    0%,100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
    50%     { opacity: 1;   transform: translate(-50%,-50%) scale(1.2); }
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid;
    z-index: 6;
    top: 50%; left: 50%;
    pointer-events: none;
  }
  .ring-outer {
    width: calc(100% + 36px); height: calc(100% + 36px);
    transform: translate(-50%, -50%);
    border-color: rgba(200,132,10,0.35);
    animation: ringBreath 5s ease-in-out infinite;
  }
  .ring-inner {
    width: calc(100% + 16px); height: calc(100% + 16px);
    transform: translate(-50%, -50%);
    border-color: rgba(42,90,98,0.55);
    animation: ringBreath 5s ease-in-out infinite 1s;
  }
  @keyframes ringBreath {
    0%,100% { opacity: 0.4; }
    50%     { opacity: 1; }
  }
  .ornament {
    position: absolute;
    width: 13px; height: 13px;
    background: var(--amber);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    z-index: 7;
    animation: ornamentGlow 3s ease-in-out infinite;
    pointer-events: none;
  }
  .orn-t { top: -6px;    left: 50%;  transform: translateX(-50%); }
  .orn-b { bottom: -6px; left: 50%;  transform: translateX(-50%); }
  .orn-l { left: -6px;   top: 50%;   transform: translateY(-50%); }
  .orn-r { right: -6px;  top: 50%;   transform: translateY(-50%); }
  @keyframes ornamentGlow {
    0%,100% { box-shadow: 0 0 6px var(--amber); }
    50%     { box-shadow: 0 0 18px var(--amber-bright), 0 0 40px rgba(200,132,10,0.4); }
  }

  /* ── Top whisper ── */
  .whisper {
    position: fixed;
    top: 2rem;
    left: 0; right: 0;
    text-align: center;
    font-family: 'IM Fell English SC', serif;
    font-size: clamp(0.55rem, 1.4vw, 0.82rem);
    letter-spacing: 0.35em;
    color: var(--parchment);
    text-transform: uppercase;
    z-index: 10;
    animation: fadeIn 1s ease-out 0.5s both;
  }

  /* ── Bottom text block ── */
  .text-block {
    position: fixed;
    bottom: 2rem;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    z-index: 10;
    padding: 0 1rem;
    animation: riseUp 1.2s ease-out 1s both;
  }
  @keyframes riseUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: min(420px, 90vw);
  }
  .divider-line {
    flex: 1; height: 1px;
    background: linear-gradient(to right, transparent, var(--amber), transparent);
    opacity: 0.6;
  }
  .divider-gem {
    width: 8px; height: 8px;
    background: var(--amber);
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    box-shadow: 0 0 10px var(--amber-bright);
    flex-shrink: 0;
  }

  .main-title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.3rem, 3.2vw, 2.6rem);
    font-weight: 900;
    color: var(--cream);
    letter-spacing: 0.06em;
    line-height: 1.15;
    text-align: center;
    text-shadow:
      0 0 30px rgba(200,132,10,0.5),
      0 0 80px rgba(200,132,10,0.2),
      2px 2px 0 rgba(0,0,0,0.8);
    animation: titleFlicker 8s ease-in-out infinite 2s;
  }
  @keyframes titleFlicker {
    0%,95%,100% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
    98% { opacity: 0.9; }
  }

  .coming-soon {
    font-family: 'IM Fell English SC', serif;
    font-size: 0.72rem;
    letter-spacing: 0.55em;
    color: var(--amber);
    text-transform: uppercase;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.5; }
    50%     { opacity: 1; text-shadow: 0 0 15px var(--amber-bright); }
  }

  /* ── Rune footer ── */
  .rune-text {
    position: fixed;
    bottom: 0.4rem;
    left: 0; right: 0;
    text-align: center;
    font-family: 'IM Fell English SC', serif;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: rgba(100,170,160,0.22);
    z-index: 10;
    animation: fadeIn 2s ease-out 3s both;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="fog" id="fog"></div>

<!-- Rotating rune circle -->
<div class="rune-ring">
  <svg viewBox="0 0 700 700" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="350" cy="350" r="320" stroke="#6aaba8" stroke-width="1.5" stroke-dasharray="8 12"/>
    <circle cx="350" cy="350" r="290" stroke="#c8840a" stroke-width="0.8"/>
    <circle cx="350" cy="350" r="260" stroke="#6aaba8" stroke-width="1" stroke-dasharray="3 20"/>
    <text font-family="serif" font-size="22" fill="#c8840a" opacity="0.9">
      <textPath href="#cp">ᚹ · ᛁᛏᚺ · ᛖᚷᚷ · ᚱᛟᛏ · ᚠᛁᚱᛖ · ᛋᚺᛖ · ᚹᚨᛚᚲᛋ · ᛏᚺᛖ · ᛈᚨᛏᚺ · ᛟᚠ · ᛏᚺᛟᚱᚾᛋ · ᛋᚺᛖ · ᚱᛖᛏᚢᚱᚾᛋ</textPath>
    </text>
    <defs>
      <path id="cp" d="M 350,350 m -280,0 a 280,280 0 1,1 560,0 a 280,280 0 1,1 -560,0"/>
    </defs>
    <polygon points="350,80 380,260 560,200 440,350 560,500 380,440 350,620 320,440 140,500 260,350 140,200 320,260"
             stroke="#c8840a" stroke-width="0.8" fill="none" opacity="0.5"/>
  </svg>
</div>

<!-- Sheep portrait — dead center inside the circle -->
<div class="portrait-wrap">
  <img class="portrait-img" src="Finethir Shinebright.png" alt="Mr. Shinebright"/>
  <div class="eye-glow"></div>
  <div class="ring ring-outer"></div>
  <div class="ring ring-inner"></div>
  <div class="ornament orn-t"></div>
  <div class="ornament orn-b"></div>
  <div class="ornament orn-l"></div>
  <div class="ornament orn-r"></div>
</div>

<!-- Top whisper -->
<div class="whisper">This boss requires your strongest allies</div>

<!-- Bottom title -->
<div class="text-block">
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-gem"></div>
    <div class="divider-line"></div>
  </div>
  <div class="main-title">Mr. Shinebright Returns!</div>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-gem"></div>
    <div class="divider-line"></div>
  </div>
  <div class="coming-soon">⁕ &nbsp; Next Session &nbsp; ⁕</div>
</div>

<div class="rune-text">ᛋᚺᛖ ᚾᛖᚹᛖᚱ ᛚᛖᚠᛏ · ᛋᚺᛖ ᚹᚨᛁᛏᛖᛞ</div>

<script>
  for (let i = 0; i < 30; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.cssText = `
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --dx:${(Math.random()-0.5)*200}px; --dy:${-(Math.random()*300+100)}px;
      animation-duration:${Math.random()*5+4}s;
      animation-delay:${Math.random()*8}s;
      box-shadow:0 0 4px #f0a820,0 0 8px #c8840a;
    `;
    document.body.appendChild(s);
  }
  const fogEl = document.getElementById('fog');
  for (let i = 0; i < 10; i++) {
    const f = document.createElement('div');
    f.className = 'fog-particle';
    f.style.cssText = `
      width:${Math.random()*400+200}px; height:${Math.random()*400+200}px;
      left:${Math.random()*80}%; top:${Math.random()*80}%;
      animation-duration:${Math.random()*15+20}s;
      animation-delay:${Math.random()*-20}s;
    `;
    fogEl.appendChild(f);
  }
</script>
</body>
</html>
